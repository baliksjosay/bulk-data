openapi: 3.1.0
info:
  title: MTN Bulk Data Wholesale Service API
  version: 0.1.0
  description: Backend contract required by the frontend-only MTN Bulk Data Wholesale Service console.
  x-api-requirements:
    - Every response must use the standard success/error envelope documented in components.schemas.ApiEnvelope and components.schemas.ErrorEnvelope.
    - Authenticated operations require the hardened HTTP-only JWT session cookie unless the operation explicitly sets security to an empty list.
    - Paginated table endpoints must return page, limit, total, totalPages, hasNextPage, and hasPreviousPage in meta.
    - Phone and MSISDN input must be normalized to E.164 Uganda numbers matching +256(77|78|79|76|39)XXXXXXX.
    - List endpoints with search parameters must support backend search because the frontend uses asynchronous API search when local table search has no matches.
    - Payment initiation must return a pending transaction and payment session that can be tracked globally until confirmation, expiry, or failure.
    - Customer account activation must follow the solution-document flow: activation link, email OTP verification, password creation, activation notification, then immediate portal access.
    - Bundle package validity is fixed at 30 days; configurable bundle fields are service code, name, volume up to 4 TB, price, status, and visibility.
    - PCRF is abstracted behind Provisioning; public API routes must use provisioning resources while the backend adapter maps to configured upstream PCRF endpoints.
servers:
  - url: https://backend.example.com/api
    description: Live backend base URL
security:
  - cookieAuth: []
tags:
  - name: Auth
  - name: Users
  - name: Provisioning
  - name: Overview
  - name: Customers
  - name: Bundles
  - name: Purchases
  - name: Service Requests
  - name: Secondary Numbers
  - name: Reports
  - name: Preferences
  - name: Security
  - name: Audit
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Sign in user
      description: Authenticates customers with phone, email, or TIN OTP; privileged users with username, email, or phone number plus password and MFA; or any enrolled user with WebAuthn/passkeys. The frontend uses promptPasswordlessSetup from the response to decide whether to show the post-login passkey setup prompt after successful login.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
            examples:
              accountPassword:
                summary: Privileged username, email, or phone password login
                value:
                  method: password
                  username: jbalikuddembe
                  password: "********"
              otp:
                summary: OTP verification login
                value:
                  method: otp
                  identifier: "+256772991001"
                  identifierKind: phone
                  otp: "12345"
              tinOtp:
                summary: TIN OTP verification login
                value:
                  method: otp
                  identifier: "1000172796"
                  identifierKind: tin
                  otp: "12345"
              passkey:
                summary: Passkey login
                value:
                  method: passkey
                  credentialId: webauthn-credential-id
      responses:
        "200":
          description: Signed in successfully
          headers:
            Set-Cookie:
              description: Sets the HTTP-only JWT session cookie. Production cookies must use __Host-mtn_bds_session with HttpOnly, Secure, SameSite=Strict, Path=/, Max-Age=28800, and no Domain attribute.
              schema:
                type: string
                example: __Host-mtn_bds_session=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...; Max-Age=28800; Path=/; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
              examples:
                passwordLoginSuccess:
                  $ref: "#/components/examples/AuthLoginSuccessResponseExample"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
  /users/staff:
    post:
      tags: [Users]
      summary: Create admin or support user
      description: Allows an authenticated administrator to create another admin or support user by submitting phoneNumber, email, lanId, and role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUserCreateRequest"
            examples:
              supportUser:
                summary: Create support user
                value:
                  phoneNumber: "+256789172796"
                  email: support.agent@example.com
                  lanId: support.agent
                  role: SUPPORT
      responses:
        "201":
          description: Staff user created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserAccount"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
  /auth/activation/otp:
    post:
      tags: [Auth]
      summary: Issue customer account activation OTP
      description: Starts the solution-document activation flow after the contact person opens the activation link. BDS sends an OTP to the contact person's email address.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountActivationOtpRequest"
      responses:
        "200":
          description: Activation OTP issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountActivationOtpResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
  /auth/activation/otp/verify:
    post:
      tags: [Auth]
      summary: Verify customer account activation OTP
      description: Validates the email OTP from the activation flow and returns a short-lived password setup token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountActivationOtpVerificationRequest"
      responses:
        "200":
          description: Activation OTP verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountActivationOtpVerificationResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
  /auth/activation/password:
    post:
      tags: [Auth]
      summary: Create password and activate customer account
      description: Creates the contact person's first password after OTP verification, activates the customer account, sends activation notifications, and starts a session for immediate portal access.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountActivationPasswordRequest"
      responses:
        "200":
          description: Account activated
          headers:
            Set-Cookie:
              description: Sets the HTTP-only JWT session cookie for immediate portal access.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
  /provisioning/group-member:
    post:
      tags: [Provisioning]
      summary: Add Provisioning group member
      description: Privileged Provisioning operation that adds a secondary MSISDN under a primary subscription. Admin and support roles only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisioningAddGroupMemberRequest"
      responses:
        "200":
          description: Group member request accepted by Provisioning
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisioningAddGroupMemberResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /provisioning/group-members/bulk:
    post:
      tags: [Provisioning]
      summary: Bulk add Provisioning group members
      description: Privileged Provisioning operation that adds multiple secondary MSISDNs in one provider request. Admin and support roles only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisioningAddGroupMembersBulkRequest"
      responses:
        "200":
          description: Bulk group-member request accepted by Provisioning
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisioningAddGroupMembersBulkResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /provisioning/group-member/delete:
    post:
      tags: [Provisioning]
      summary: Delete Provisioning group member
      description: Privileged Provisioning operation that removes a secondary MSISDN from a grouped subscription. Admin and support roles only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisioningDeleteGroupMemberRequest"
      responses:
        "200":
          description: Group member delete request accepted by Provisioning
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisioningDeleteGroupMemberResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /provisioning/subscriptions/update:
    post:
      tags: [Provisioning]
      summary: Update Provisioning subscription
      description: Privileged Provisioning operation used after successful payment to apply additional provisioning/top-up attempts. Admin and support roles only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisioningUpdateSubscriptionRequest"
      responses:
        "200":
          description: Subscription update request accepted by Provisioning
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisioningUpdateSubscriptionResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /provisioning/subscriber:
    post:
      tags: [Provisioning]
      summary: Add Provisioning subscriber
      description: Privileged Provisioning operation that registers a primary subscriber. PCRF remains abstracted behind the backend adapter and is not exposed as a public API resource. Admin and support roles only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisioningAddSubscriberRequest"
            example:
              msisdn: "256779999707"
              transactionId: "78954566743"
      responses:
        "200":
          description: Subscriber request accepted by Provisioning
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisioningAddSubscriberResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /overview:
    get:
      tags: [Overview]
      summary: Fetch dashboard overview
      parameters:
        - $ref: "#/components/parameters/RevenuePeriod"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
      responses:
        "200":
          description: Overview fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverviewResponse"
              examples:
                overview:
                  $ref: "#/components/examples/OverviewResponseExample"
  /customers:
    get:
      tags: [Customers]
      summary: List customer accounts
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Search"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, deactivated, pending]
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
      responses:
        "200":
          description: Customers fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerListResponse"
              examples:
                paginatedCustomers:
                  $ref: "#/components/examples/CustomerListResponseExample"
    post:
      tags: [Customers]
      summary: Register a customer
      description: Validates the primary MSISDN APN, adds subscriber to Provisioning, and triggers account activation notifications.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerRegistrationRequest"
            examples:
              registerCustomer:
                $ref: "#/components/examples/CustomerRegistrationRequestExample"
      responses:
        "200":
          description: Customer registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerRegistrationResponse"
              examples:
                registeredCustomer:
                  $ref: "#/components/examples/CustomerRegistrationResponseExample"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
  /customers/{customerId}:
    parameters:
      - $ref: "#/components/parameters/CustomerId"
    get:
      tags: [Customers]
      summary: Get customer account
      responses:
        "200":
          description: Customer fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"
              examples:
                customer:
                  $ref: "#/components/examples/CustomerResponseExample"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    patch:
      tags: [Customers]
      summary: Update customer account details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdateRequest"
            examples:
              updateCustomer:
                $ref: "#/components/examples/CustomerUpdateRequestExample"
      responses:
        "200":
          description: Customer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"
              examples:
                updatedCustomer:
                  $ref: "#/components/examples/CustomerResponseExample"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
  /customers/{customerId}/status:
    parameters:
      - $ref: "#/components/parameters/CustomerId"
    post:
      tags: [Customers]
      summary: Deactivate or reactivate customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerStatusChangeRequest"
            examples:
              deactivateCustomer:
                $ref: "#/components/examples/CustomerStatusChangeRequestExample"
      responses:
        "200":
          description: Customer status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"
              examples:
                statusUpdated:
                  $ref: "#/components/examples/CustomerDeactivatedResponseExample"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
  /customers/{customerId}/primary-msisdns:
    parameters:
      - $ref: "#/components/parameters/CustomerId"
    post:
      tags: [Customers]
      summary: Add primary MSISDN
      description: Runs APN validation through the configured VasApps/UDM provider before adding the primary MSISDN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrimaryMsisdnRequest"
            examples:
              addPrimaryMsisdn:
                $ref: "#/components/examples/PrimaryMsisdnRequestExample"
      responses:
        "200":
          description: Primary MSISDN added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrimaryMsisdnResponse"
              examples:
                primaryMsisdnAdded:
                  $ref: "#/components/examples/PrimaryMsisdnResponseExample"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
  /customers/{customerId}/primary-msisdns/{primaryMsisdn}/balance:
    parameters:
      - $ref: "#/components/parameters/CustomerId"
      - $ref: "#/components/parameters/PrimaryMsisdn"
    get:
      tags: [Customers]
      summary: Check bundle balance
      description: Retrieves bundle volume and expiry from Provisioning.
      responses:
        "200":
          description: Balance fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResponse"
              examples:
                balance:
                  $ref: "#/components/examples/BalanceResponseExample"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /customers/{customerId}/primary-msisdns/{primaryMsisdn}/secondary-numbers:
    parameters:
      - $ref: "#/components/parameters/CustomerId"
      - $ref: "#/components/parameters/PrimaryMsisdn"
    get:
      tags: [Secondary Numbers]
      summary: List secondary numbers
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Search"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, removed]
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
      responses:
        "200":
          description: Secondary numbers fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecondaryNumberListResponse"
              examples:
                paginatedSecondaryNumbers:
                  $ref: "#/components/examples/SecondaryNumberListResponseExample"
    post:
      tags: [Secondary Numbers]
      summary: Add secondary number
      description: Validates the secondary MSISDN through the configured VasApps/UDM APN provider before adding the number. The request is rejected when the provider returns multiple APNs or a single APN that does not match the registered customer APN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecondaryNumberRequest"
            examples:
              addSecondaryNumber:
                $ref: "#/components/examples/SecondaryNumberRequestExample"
      responses:
        "200":
          description: Secondary number added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecondaryNumberMutationResponse"
              examples:
                secondaryNumberAdded:
                  $ref: "#/components/examples/SecondaryNumberMutationResponseExample"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
  /customers/{customerId}/primary-msisdns/{primaryMsisdn}/secondary-numbers/bulk:
    parameters:
      - $ref: "#/components/parameters/CustomerId"
      - $ref: "#/components/parameters/PrimaryMsisdn"
    post:
      tags: [Secondary Numbers]
      summary: Bulk upload secondary numbers
      description: Validates each uploaded MSISDN through the configured VasApps/UDM APN provider and reports rejected numbers with the exact APN rule that failed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecondaryBulkRequest"
            examples:
              bulkUploadSecondaryNumbers:
                $ref: "#/components/examples/SecondaryBulkRequestExample"
      responses:
        "200":
          description: Bulk upload processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecondaryBulkResponse"
              examples:
                bulkUploadProcessed:
                  $ref: "#/components/examples/SecondaryBulkResponseExample"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
  /customers/{customerId}/primary-msisdns/{primaryMsisdn}/secondary-numbers/{secondaryMsisdn}:
    parameters:
      - $ref: "#/components/parameters/CustomerId"
      - $ref: "#/components/parameters/PrimaryMsisdn"
      - name: secondaryMsisdn
        in: path
        required: true
        description: URL-encode the leading plus sign when sending this path parameter, for example %2B256772991001.
        schema:
          $ref: "#/components/schemas/UgandaPhoneNumber"
    delete:
      tags: [Secondary Numbers]
      summary: Remove secondary number
      description: Sends deleteGroupMember to Provisioning and removes the local secondary-number flag.
      responses:
        "200":
          description: Secondary number removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecondaryNumberResponse"
              examples:
                secondaryNumberRemoved:
                  $ref: "#/components/examples/SecondaryNumberRemovedResponseExample"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /customers/{customerId}/primary-msisdns/{primaryMsisdn}/secondary-numbers/{secondaryMsisdn}/usage:
    parameters:
      - $ref: "#/components/parameters/CustomerId"
      - $ref: "#/components/parameters/PrimaryMsisdn"
      - name: secondaryMsisdn
        in: path
        required: true
        description: URL-encode the leading plus sign when sending this path parameter, for example %2B256772991001.
        schema:
          $ref: "#/components/schemas/UgandaPhoneNumber"
    get:
      tags: [Secondary Numbers]
      summary: Check secondary number usage
      description: Returns usage and remaining allocation for a secondary MSISDN under a customer primary MSISDN.
      responses:
        "200":
          description: Secondary MSISDN usage fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecondaryUsageResponse"
              examples:
                secondaryUsage:
                  $ref: "#/components/examples/SecondaryUsageResponseExample"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /bundles:
    get:
      tags: [Bundles]
      summary: List configured wholesale bundles
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, paused, disabled]
        - name: visible
          in: query
          required: false
          schema:
            type: boolean
        - $ref: "#/components/parameters/Search"
      responses:
        "200":
          description: Bundles fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleListResponse"
              examples:
                bundles:
                  $ref: "#/components/examples/BundleListResponseExample"
    post:
      tags: [Bundles]
      summary: Create bundle package
      description: Adds a wholesale bundle package to the catalog. Admins may create hidden or disabled packages before release.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BundlePackageRequest"
            examples:
              createPackage:
                $ref: "#/components/examples/BundlePackageRequestExample"
      responses:
        "200":
          description: Bundle package created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleResponse"
              examples:
                packageCreated:
                  $ref: "#/components/examples/BundleResponseExample"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
  /bundles/{bundleId}:
    parameters:
      - $ref: "#/components/parameters/BundleId"
    get:
      tags: [Bundles]
      summary: Get bundle package
      responses:
        "200":
          description: Bundle package fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleResponse"
              examples:
                package:
                  $ref: "#/components/examples/BundleResponseExample"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    patch:
      tags: [Bundles]
      summary: Update bundle package
      description: Updates package details, customer visibility, and active/paused/disabled state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BundlePackageUpdateRequest"
            examples:
              updatePackage:
                $ref: "#/components/examples/BundlePackageUpdateRequestExample"
      responses:
        "200":
          description: Bundle package updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleResponse"
              examples:
                packageUpdated:
                  $ref: "#/components/examples/BundleResponseExample"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
  /purchases:
    post:
      tags: [Purchases]
      summary: Initiate bundle payment
      description: Creates a pending transaction and payment session. Mobile money payments use the configured MoMo provider; when SP transfer mode is enabled, the API posts FromFri, ToFri, Amount, Currency, ExternalTransactionId, and ReferenceId to ECW /sptransfer/ and waits for the asynchronous provider callback. Airtime payments use the update-balance-and-date integration at the configured 9040 base URL with originTimeStamp, originTransactionID, subscriberNumber, and a negative adjustmentAmountRelative, then wait for the asynchronous deduction callback. PRN payments call the configured Generate PRN provider endpoint with customerMsisdn, customerName, productCode, productName, amount, payingCurrency, transactionId, and additionalInfo, then return the provider paymentReference as the PRN while waiting for the paid callback; card payments initiate the configured card provider and return paymentUrl for frontend popup checkout. PCRF is called only after customer payment is confirmed, using the internal Provisioning subscribe-service adapter with msisdn, serviceCode, startDateTime, endDateTime, and transactionId. Subscribe timestamps use yyyy-MM-ddTHH:mm:ss. The frontend subscribes to the returned Socket.IO room/event for provider confirmation before provisioning.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseRequest"
            examples:
              prnPurchase:
                $ref: "#/components/examples/PurchaseRequestPrnExample"
              mobileMoneyPurchase:
                $ref: "#/components/examples/PurchaseRequestMobileMoneyExample"
              cardPurchase:
                $ref: "#/components/examples/PurchaseRequestCardExample"
      responses:
        "200":
          description: Payment initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseResponse"
              examples:
                prnPaymentInitiated:
                  $ref: "#/components/examples/PurchaseResponsePrnExample"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
  /purchases/{transactionId}/retry:
    post:
      tags: [Purchases]
      summary: Retry failed payment
      description: Creates a fresh payment session for a failed transaction and moves the transaction back to pending. Receipts must only be issued for provisioned transactions.
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseRetryRequest"
            examples:
              retryPrnPayment:
                $ref: "#/components/examples/PurchaseRetryRequestExample"
      responses:
        "200":
          description: Payment retry initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseResponse"
              examples:
                retryInitiated:
                  $ref: "#/components/examples/PurchaseRetryResponseExample"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
  /purchases/{transactionId}/confirmation:
    post:
      tags: [Purchases]
      summary: Confirm payment and provision bundle
      description: Confirms a provider payment event, provisions the bundle, and returns the Provisioning request flags. In production this is normally driven by the payment provider/webhook after a Socket.IO payment status event.
      parameters:
        - name: transactionId
          in: path
          required: true

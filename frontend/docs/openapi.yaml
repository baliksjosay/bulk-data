  schemas:
    ApiEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
        message:
          type: string
        data: {}
        meta:
          $ref: "#/components/schemas/PaginationMeta"
    AuthLoginRequest:
      type: object
      required: [method]
      properties:
        method:
          type: string
          enum: [otp, password, passkey]
          description: Login method selected by the user.
        identifier:
          type: string
          description: Phone number, email address, or TIN for OTP login.
          example: "+256772991001"
        identifierKind:
          type: string
          enum: [phone, email, tin]
          description: Normalized identifier type supplied by the frontend for OTP login.
        otp:
          type: string
          pattern: "^\\d{5}$"
          description: Five-digit OTP code for customer OTP login.
          example: "12345"
        email:
          type: string
          format: email
          description: Email address for password login.
          example: joseph.balikuddembe@example.com
        username:
          type: string
          description: Username for password login.
          example: jbalikuddembe
        phoneNumber:
          type: string
          description: Phone number for password login.
          example: "+256789172796"
        password:
          type: string
          format: password
          writeOnly: true
          description: Password for password login.
        credentialId:
          type: string
          description: WebAuthn credential identifier for passkey login.
    AccountActivationOtpRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: Activation token from the account activation link sent to the contact person.
    AccountActivationOtpResult:
      type: object
      required: [activationId, maskedEmail, expiresAt, retryAfterSeconds]
      properties:
        activationId:
          type: string
        maskedEmail:
          type: string
          example: sa***@wavenet.ug
        expiresAt:
          type: string
          format: date-time
        retryAfterSeconds:
          type: integer
          minimum: 0
    AccountActivationOtpVerificationRequest:
      type: object
      required: [token, activationId, otp]
      properties:
        token:
          type: string
        activationId:
          type: string
        otp:
          type: string
          pattern: "^\\d{6}$"
          example: "123456"
    AccountActivationOtpVerificationResult:
      type: object
      required: [passwordSetupToken, expiresAt]
      properties:
        passwordSetupToken:
          type: string
        expiresAt:
          type: string
          format: date-time
    AccountActivationPasswordRequest:
      type: object
      required: [passwordSetupToken, password, confirmPassword]
      properties:
        passwordSetupToken:
          type: string
        password:
          type: string
          format: password
          minLength: 12
          writeOnly: true
          description: Must satisfy the platform password rules.
        confirmPassword:
          type: string
          format: password
          writeOnly: true
    AuthenticatedUser:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, support, customer]
        customerId:
          type: string
          description: Present when the signed-in user is linked to a customer account.
    StaffUserCreateRequest:
      type: object
      required: [phoneNumber, email, lanId, role]
      properties:
        phoneNumber:
          type: string
          description: Staff phone number used for account contact and verification challenges.
          example: "+256789172796"
        email:
          type: string
          format: email
          description: Staff email address.
          example: support.agent@example.com
        lanId:
          type: string
          description: Corporate login identifier for the user.
          pattern: "^[A-Za-z0-9._-]+$"
          example: support.agent
        role:
          type: string
          enum: [ADMIN, SUPPORT]
          description: Staff role to assign.
          example: SUPPORT
    UserAccount:
      type: object
      required:
        - id
        - email
        - authProvider
        - roles
        - status
        - emailVerified
        - isLocked
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
          nullable: true
        email:
          type: string
          format: email
        phoneNumber:
          type: string
        authProvider:
          type: string
          enum: [LOCAL, GOOGLE, MICROSOFT, ACTIVE_DIRECTORY]
        externalId:
          type: string
          description: External identity reference used by the configured authentication provider.
        roles:
          type: array
          items:
            type: string
            enum: [SUPER_ADMIN, ADMIN, CUSTOMER, SUPPORT]
        status:
          type: string
          enum: [PENDING, ACTIVE, INACTIVE, SUSPENDED, LOCKED]
        emailVerified:
          type: boolean
        isLocked:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PasswordlessSetupPrompt:
      type: object
      required: [title, message, setupUrl]
      properties:
        title:
          type: string
          example: Set up passwordless login
        message:
          type: string
          example: Add a passkey so your next sign-in can use your device PIN, fingerprint, or face unlock.
        setupUrl:
          type: string
          example: /console?section=security
          description: Frontend route opened when the user chooses to set up passkeys after login.
    AuthLoginResult:
      type: object
      required: [user, session, nextRoute, promptPasswordlessSetup]
      properties:
        mfaRequired:
          type: boolean
          enum: [false]
        user:
          $ref: "#/components/schemas/AuthenticatedUser"
        session:
          type: object
          required: [id, expiresAt]
          properties:
            id:
              type: string
            expiresAt:
              type: string
              format: date-time
        nextRoute:
          type: string
          example: /console
        promptPasswordlessSetup:
          type: boolean
          description: When true, the frontend shows the post-login passkey setup prompt.
        passwordlessSetupPrompt:
          $ref: "#/components/schemas/PasswordlessSetupPrompt"
    AuthMfaChallenge:
      type: object
      required: [mfaRequired, challengeToken, challengeId, mfaMethod, user]
      properties:
        mfaRequired:
          type: boolean
          enum: [true]
        challengeToken:
          type: string
        challengeId:
          type: string
        mfaMethod:
          type: string
          enum: [totp, email-otp, sms-otp, webauthn, recovery-code]
          description: Email OTP is the default staff MFA method when no stronger factor is primary.
        user:
          $ref: "#/components/schemas/AuthenticatedUser"
    PaginationMeta:
      type: object
      required: [page, limit, total, totalPages, hasNextPage, hasPreviousPage]
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 1
        hasNextPage:
          type: boolean
        hasPreviousPage:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          const: false
        message:
          type: string
        data:
          type: "null"
    UgandaPhoneNumber:
      type: string
      description: E.164 Uganda phone/MSISDN. Must start with +256 followed by 77, 78, 79, 76, or 39 and 7 digits.
      pattern: "^\\+256(77|78|79|76|39)\\d{7}$"
      example: "+256772990001"
    ProvisioningNormalizedMsisdn:
      type: string
      description: Provisioning-normalized Uganda MTN MSISDN without the leading plus sign.
      pattern: "^256(77|78|79|76|39)\\d{7}$"
      example: "256772990001"
    ProvisioningGroupMemberPair:
      type: object
      required: [secondaryMsisdn, primaryMsisdn]
      properties:
        secondaryMsisdn:
          $ref: "#/components/schemas/ProvisioningNormalizedMsisdn"
        primaryMsisdn:
          $ref: "#/components/schemas/ProvisioningNormalizedMsisdn"
    ProvisioningAddGroupMemberRequest:
      $ref: "#/components/schemas/ProvisioningGroupMemberPair"
    ProvisioningAddGroupMembersBulkRequest:
      type: object
      required: [groupMembers]
      properties:
        groupMembers:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: "#/components/schemas/ProvisioningGroupMemberPair"
    ProvisioningDeleteGroupMemberRequest:
      type: object
      required: [secondaryMsisdn]
      properties:
        secondaryMsisdn:
          $ref: "#/components/schemas/ProvisioningNormalizedMsisdn"
    ProvisioningUpdateSubscriptionRequest:
      type: object
      required:
        - primaryMsisdn
        - serviceCode
        - transactionId
        - topupValue
        - updateAttemptCount
      properties:
        primaryMsisdn:
          $ref: "#/components/schemas/ProvisioningNormalizedMsisdn"
        serviceCode:
          type: string
          example: DATA_BUNDLE_CODE
        transactionId:
          type: string
          example: "567123456"
        topupValue:
          type: integer
          minimum: 1
          description: Top-up volume in kilobytes (KB). Purchase workflows must convert bundle volume to KB before calling this endpoint.
          example: 1024
        updateAttemptCount:
          type: integer
          minimum: 0
          example: 4
    ProvisioningAddSubscriberRequest:
      type: object
      required: [msisdn, transactionId]
      properties:
        msisdn:
          $ref: "#/components/schemas/ProvisioningNormalizedMsisdn"
        transactionId:
          type: string
          example: "78954566743"
    ProvisioningCommandResult:
      type: object
      required:
        [
          requestId,
          operation,
          accepted,
          processedAt,
          providerStatusCode,
          request,
        ]
      properties:
        requestId:
          type: string
          format: uuid
        operation:
          type: string
          enum:
            - add_group_member
            - add_group_members_bulk
            - delete_group_member
            - update_subscription
            - add_subscriber
            - subscribe_service
        accepted:
          type: boolean
          example: true
        processedAt:
          type: string
          format: date-time
        providerStatusCode:
          type: integer
          example: 200
        request:
          type: object
        providerResponse:
          type: object
          additionalProperties: true
          nullable: true
          example:
            successful: true
            resultCode: "0"
            message: Operation succeeded
    ProvisioningAddGroupMemberResult:
      allOf:
        - $ref: "#/components/schemas/ProvisioningCommandResult"
        - type: object
          properties:
            request:
              $ref: "#/components/schemas/ProvisioningAddGroupMemberRequest"
    ProvisioningAddGroupMembersBulkResult:
      allOf:
        - $ref: "#/components/schemas/ProvisioningCommandResult"
        - type: object
          properties:
            request:
              $ref: "#/components/schemas/ProvisioningAddGroupMembersBulkRequest"
    ProvisioningDeleteGroupMemberResult:
      allOf:
        - $ref: "#/components/schemas/ProvisioningCommandResult"
        - type: object
          properties:
            request:
              $ref: "#/components/schemas/ProvisioningDeleteGroupMemberRequest"
    ProvisioningUpdateSubscriptionResult:
      allOf:
        - $ref: "#/components/schemas/ProvisioningCommandResult"
        - type: object
          properties:
            request:
              $ref: "#/components/schemas/ProvisioningUpdateSubscriptionRequest"
    ProvisioningAddSubscriberResult:
      allOf:
        - $ref: "#/components/schemas/ProvisioningCommandResult"
        - type: object
          properties:
            request:
              $ref: "#/components/schemas/ProvisioningAddSubscriberRequest"
    Customer:
      type: object
      required:
        - id
        - businessName
        - registrationNumber
        - businessEmail
        - businessPhone
        - contactPerson
        - email
        - phone
        - apnName
        - apnId
        - primaryMsisdns
        - secondaryCount
        - bundlePurchases
        - totalSpendUgx
        - status
        - createdAt
      properties:
        id:
          type: string
        businessName:
          type: string
        registrationNumber:
          type: string
        businessEmail:
          type: string
          format: email
        businessPhone:
          $ref: "#/components/schemas/UgandaPhoneNumber"
        contactPerson:
          type: string
        email:
          type: string
          format: email
        phone:
          $ref: "#/components/schemas/UgandaPhoneNumber"
        apnName:
          type: string
        apnId:
          type: string
        primaryMsisdns:
          type: array
          items:
            $ref: "#/components/schemas/UgandaPhoneNumber"
        secondaryCount:
          type: integer
        bundlePurchases:
          type: integer
        totalSpendUgx:
          type: number
        status:
          type: string
          enum: [active, deactivated, pending]
        deactivationReason:
          type: string
        createdAt:
          type: string
          format: date-time
    CustomerRegistrationRequest:
      type: object
      required:
        - businessName
        - registrationNumber
        - businessEmail
        - businessPhone
        - contactPerson
        - contactEmail
        - contactPhone
        - apnName
        - apnId
        - primaryMsisdn
      properties:
        businessName:
          type: string
        registrationNumber:
          type: string
        businessEmail:
          type: string
          format: email
        businessPhone:
          $ref: "#/components/schemas/UgandaPhoneNumber"
        contactPerson:
          type: string
        contactEmail:
          type: string
          format: email
        contactPhone:
          $ref: "#/components/schemas/UgandaPhoneNumber"
        apnName:
          type: string
        apnId:
          type: string
        primaryMsisdn:
          $ref: "#/components/schemas/UgandaPhoneNumber"
    CustomerActivationNotice:
      type: object
      required: [activationToken, activationUrl, expiresAt, deliveryChannels]
      description: Activation details produced after successful customer registration. In production, the token is delivered by email rather than exposed to browser users.
      properties:
        activationToken:
          type: string
        activationUrl:
          type: string
          example: /auth/activate?token=act_demo
        expiresAt:
          type: string
          format: date-time
        deliveryChannels:
          type: array
          items:
            type: string
            enum: [business_email, contact_email]
    CustomerUpdateRequest:
      type: object
      properties:
        businessName:
          type: string
        businessEmail:
          type: string
          format: email
        businessPhone:
          $ref: "#/components/schemas/UgandaPhoneNumber"
        contactPerson:
          type: string
        contactEmail:
          type: string
          format: email
        contactPhone:
          $ref: "#/components/schemas/UgandaPhoneNumber"
        apnName:
          type: string
        apnId:
          type: string
    CustomerStatusChangeRequest:
      type: object
      required: [status, reason]
      properties:
        status:
          type: string
          enum: [active, deactivated]
        reason:
          type: string
        supportingNote:
          type: string
    ServiceRequestRequest:
      type: object
      required: [businessName, contactPerson, contactEmail, contactPhone]
      properties:
        businessName:
          type: string
          minLength: 2
          maxLength: 120
          example: WaveNet
        contactPerson:
          type: string
          minLength: 2
          maxLength: 120
          example: Sarah Namuli
        contactEmail:
          type: string
          format: email
          maxLength: 160
          example: operations@wavenet.ug
        contactPhone:
          $ref: "#/components/schemas/UgandaPhoneNumber"
        preferredPackageId:
          type: string
          description: Optional bundle package identifier selected from the public package catalog.
          example: bundle-1tb
        message:
          type: string
          maxLength: 800
          example: We need wholesale data for branches and managed device fleets.
    ServiceRequest:
      type: object
      required:
        [
          id,
          businessName,
          contactPerson,
          contactEmail,
          contactPhone,
          status,
          createdAt,
        ]
      properties:
        id:
          type: string
        businessName:
          type: string
        contactPerson:
          type: string
        contactEmail:
          type: string
          format: email
        contactPhone:
          $ref: "#/components/schemas/UgandaPhoneNumber"
        preferredPackageId:
          type: string
        preferredPackageName:
          type: string
        message:
          type: string
        status:
          type: string
          enum: [new, contacted, converted]
        createdAt:
          type: string
          format: date-time
    ServiceRequestUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [new, contacted]
        note:
          type: string
          maxLength: 500
          description: Optional internal note for audit or CRM follow-up.
    PrimaryMsisdnRequest:
      type: object
      required: [primaryMsisdn]
      properties:
        primaryMsisdn:
          $ref: "#/components/schemas/UgandaPhoneNumber"
    MsisdnValidationResult:
      type: object
      required: [msisdn, accepted, reason, apnIds, registeredApnId]
      properties:
        msisdn:
          $ref: "#/components/schemas/UgandaPhoneNumber"
        accepted:
          type: boolean
        reason:
          type: string
        apnIds:
          type: array
          items:
            type: string
        registeredApnId:
          type: string
        provisioningAction:
          type: string
          enum: [addSubscriber, addGroupMember, addMultipleGroupMember]
    BundleOffer:
      type: object
      required:
        [
          id,
          serviceCode,
          name,
          volumeTb,
          priceUgx,
          validityDays,
          status,
          visible,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          type: string
        serviceCode:
          type: string
          example: BDS-1T-30D
        name:
          type: string
          example: Wholesale 1 TB
        volumeTb:
          type: number
          maximum: 4
          exclusiveMinimum: 0
        priceUgx:
          type: number
          minimum: 1
        validityDays:
          type: integer
          const: 30
          description: Bundle validity is fixed at 30 days by the solution document.
        status:
          type: string
          enum: [active, paused, disabled]
        visible:
          type: boolean
          description: Controls whether the package is visible to customer purchase flows.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BundlePackageRequest:
      type: object
      required:
        [serviceCode, name, volumeTb, priceUgx, validityDays, status, visible]
      properties:
        serviceCode:
          type: string
          example: BDS-1T-30D
        name:
          type: string
          example: Wholesale 1 TB
        volumeTb:
          type: number
          exclusiveMinimum: 0
          maximum: 4
        priceUgx:
          type: integer
          minimum: 1
          example: 2300000
        validityDays:
          type: integer
          const: 30
          example: 30
        status:
          type: string
          enum: [active, paused, disabled]
        visible:
          type: boolean
    BundlePackageUpdateRequest:
      type: object
      properties:
        serviceCode:
          type: string
        name:
          type: string
        volumeTb:
          type: number
          exclusiveMinimum: 0
          maximum: 4
        priceUgx:
          type: integer
          minimum: 1
        validityDays:
          type: integer
          const: 30
        status:
          type: string
          enum: [active, paused, disabled]
        visible:
          type: boolean
    PurchaseRequest:
      type: object
      required:
        [customerId, primaryMsisdn, bundleId, provisioningCount, paymentMethod]
      properties:
        customerId:
          type: string
        primaryMsisdn:
          $ref: "#/components/schemas/UgandaPhoneNumber"
        bundleId:
          type: string
        provisioningCount:
          type: integer
          minimum: 1
          maximum: 12
        paymentMethod:
          type: string
          enum: [mobile_money, airtime, prn, card]
        payingMsisdn:
          $ref: "#/components/schemas/UgandaPhoneNumber"
        prnProvider:
          type: string
          enum: [bank, mobile_money]
          description: Required when paymentMethod is prn.
        autoRenew:
          type: boolean
        redirectUrl:
          type: string
          format: uri
          description: Card gateway return URL.
        additionalInfo:
          type: string
          maxLength: 300
          description: Optional PRN provider note.
    PurchaseRetryRequest:
      type: object
      properties:
        paymentMethod:
          type: string
          enum: [mobile_money, airtime, prn, card]
          description: Optional override. Defaults to the failed transaction payment method.
        payingMsisdn:
          $ref: "#/components/schemas/UgandaPhoneNumber"
        prnProvider:
          type: string
          enum: [bank, mobile_money]
          description: Required when retrying as PRN if the backend cannot infer a default provider.
        redirectUrl:
          type: string
          format: uri
          description: Card gateway return URL.
        additionalInfo:
          type: string
          maxLength: 300
          description: Optional PRN provider note.
    Transaction:
      type: object
      required:
        [
          id,
          customerName,
          primaryMsisdn,
          bundleName,
          paymentMethod,
          amountUgx,
          status,
          createdAt,
        ]
      properties:
        id:
          type: string
        customerName:
          type: string
        primaryMsisdn:
          $ref: "#/components/schemas/UgandaPhoneNumber"
        bundleName:
          type: string
        paymentMethod:
          type: string
          enum: [mobile_money, airtime, prn, card]
        amountUgx:
          type: number
        status:
          type: string
          enum: [provisioned, pending, failed]
        createdAt:
          type: string
          format: date-time
    ReportTransaction:
      allOf:
        - $ref: "#/components/schemas/Transaction"
        - type: object
          required: [customerId, registrationNumber, apnId]
          properties:
            customerId:
              type: string
            registrationNumber:
              type: string
            apnId:
              type: string
    PurchaseResult:
      type: object
      required: [transaction, paymentSession]
      properties:
        transaction:
          $ref: "#/components/schemas/Transaction"
        paymentSession:
          $ref: "#/components/schemas/PaymentSession"
    PurchaseConfirmationRequest:
      type: object
      required: [sessionId, status]
      properties:
        sessionId:
          type: string
        status:
          type: string
          enum: [confirmed, failed]
    PaymentProviderCallbackRequest:
      type: object
      description: >
        Provider callback. At least one identifier is required: sessionId,
        transactionId/clientTransactionId, internalTransactionId,
        providerReference, or paymentReference. PRN callbacks may omit status
        because a provider callback is treated as paid once the PRN session is
        resolved.
      properties:
        sessionId:
          type: string
        transactionId:
          type: string
        internalTransactionId:
          type: string
          example: 6bc9766c-4f33-4493-a22c-1cc52c7ac365
        clientTransactionId:
          type: string
          example: TXN-123456789
        paymentReference:
          type: string
          example: A2086517260219
        status:
          type: string
          enum:
            [
              awaiting_payment,
              processing,
              confirmed,
              paid,
              approved,
              deducted,
              failed,
              expired,
            ]
        providerReference:
          type: string
        receiptNumber:
          type: string
        failureReason:
          type: string
    PurchaseConfirmationResult:
      type: object
      required: [transaction, paymentSession, provisioningRequest]
      properties:
        transaction:
          $ref: "#/components/schemas/Transaction"
        paymentSession:
          $ref: "#/components/schemas/PaymentSession"
        provisioningRequest:
          type: object
          required: [subscribeService, modifySubSubscription, srvTopupCount]
          properties:
            subscribeService:
              type: boolean
            modifySubSubscription:
              type: boolean
            srvTopupCount:
              type: integer
            providerResult:
              $ref: "#/components/schemas/ProvisioningCommandResult"
    PaymentSession:
      type: object
      required:
        [
          id,
          transactionId,
          paymentMethod,
          status,
          amountUgx,
          currency,
          socketEvent,
          socketRoom,
          expiresAt,
          createdAt,
          customerId,
          bundleId,
          provisioningCount,
        ]
      properties:
        id:
          type: string
        transactionId:
          type: string
        paymentMethod:
          type: string
          enum: [mobile_money, airtime, prn, card]
        status:
          type: string
          enum: [awaiting_payment, processing, confirmed, failed, expired]
        amountUgx:
          type: number
        currency:
          type: string
          enum: [UGX]
        prn:
          type: string
          description: Generated payment registration number for PRN payments.
        provider:
          type: string
          enum: [bank, mobile_money]
        providerTransactionId:
          type: string
          description: External provider transaction identifier, such as PRN internalTransactionId.
        providerReference:
          type: string
          description: External provider reference, such as PRN paymentReference.
        providerGeneratedAt:
          type: string
          format: date-time
          description: Timestamp returned by the external provider when the reference was generated.
        paymentUrl:
          type: string
          format: uri
          description: Secure gateway URL for card payments.
        socketEvent:
          type: string
          example: payment.status
        socketRoom:
          type: string
          example: payments:pay-abc123
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        customerId:
          type: string
        bundleId:
          type: string
        provisioningCount:
          type: integer
          minimum: 1
          maximum: 12
    PaymentStatusEvent:
      type: object
      required: [sessionId, transactionId, status, message]
      description: Socket.IO payload emitted on payment.status and the session-specific socketEvent.
      properties:
        sessionId:
          type: string
        transactionId:
          type: string
        status:
          type: string
          enum: [awaiting_payment, processing, confirmed, failed, expired]
        message:
          type: string
        provider:
          type: string
          enum: [bank, mobile_money]
        receiptNumber:
          type: string
        paidAt:
          type: string
          format: date-time
    SecondaryNumber:
      type: object
      required: [id, customerId, primaryMsisdn, msisdn, apnId, status, addedAt]
      properties:
        id:
          type: string
        customerId:
          type: string
        primaryMsisdn:
          $ref: "#/components/schemas/UgandaPhoneNumber"
        msisdn:
          $ref: "#/components/schemas/UgandaPhoneNumber"
        apnId:
          type: string
        status:
          type: string
          enum: [active, removed]
        addedAt:
          type: string
          format: date-time
    SecondaryUsageResult:
      type: object

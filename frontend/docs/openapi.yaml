components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-mtn_bds_session
      description: HTTP-only, Secure, SameSite=Strict signed JWT session cookie. Local development may use mtn_bds_session over http.
  parameters:
    CustomerId:
      name: customerId
      in: path
      required: true
      schema:
        type: string
    BundleId:
      name: bundleId
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    PrimaryMsisdn:
      name: primaryMsisdn
      in: path
      required: true
      description: URL-encode the leading plus sign when sending this path parameter, for example %2B256772990001.
      schema:
        $ref: "#/components/schemas/UgandaPhoneNumber"
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: One-based page number used by paginated tables.
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      description: Number of rows per page. Infinite scrolling uses this as the fetch batch size.
    Search:
      name: search
      in: query
      required: false
      schema:
        type: string
      description: Case-insensitive search term applied to human-readable table fields.
    RevenuePeriod:
      name: revenuePeriod
      in: query
      required: false
      schema:
        type: string
        enum: [weekly, daily, quarterly, six_months, yearly, custom]
        default: weekly
      description: Revenue trend aggregation period. Weekly returns 4 weekly totals, daily returns current-month daily points, quarterly returns 3 monthly points, six_months returns 6 monthly points, yearly returns 12 monthly points, and custom uses dateFrom/dateTo as daily points.
    DateFrom:
      name: dateFrom
      in: query
      required: false
      schema:
        type: string
        format: date
      description: Inclusive start date for date-filtered table rows. For /overview, used when revenuePeriod is custom.
    DateTo:
      name: dateTo
      in: query
      required: false
      schema:
        type: string
        format: date
      description: Inclusive end date for date-filtered table rows. For /overview, used when revenuePeriod is custom.
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            validationError:
              $ref: "#/components/examples/ErrorResponseExample"

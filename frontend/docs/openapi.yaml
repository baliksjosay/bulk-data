        balances:
          type: array
          items:
            $ref: "#/components/schemas/BalanceResult"
    UserPreferences:
      type: object
      required:
        [
          theme,
          language,
          timezone,
          defaultLanding,
          dataDensity,
          quietHours,
          notifications,
        ]
      properties:
        theme:
          type: string
          enum: [light, dark, system]
        language:
          type: string
          enum: [en, lug]
        timezone:
          type: string
        defaultLanding:
          type: string
          enum: [overview, admin, customer, security]
        dataDensity:
          type: string
          enum: [comfortable, compact]
        quietHours:
          type: object
          required: [enabled, start, end]
          properties:
            enabled:
              type: boolean
            start:
              type: string
              pattern: "^\\d{2}:\\d{2}$"
            end:
              type: string
              pattern: "^\\d{2}:\\d{2}$"
        notifications:
          type: object
          required: [email, sms, whatsapp, inApp]
          properties:
            email:
              type: boolean
            sms:
              type: boolean
            whatsapp:
              type: boolean
            inApp:
              type: boolean
    MfaConfiguration:
      type: object
      required:
        [
          services,
          trustedDeviceDays,
          stepUpForBundlePurchases,
          stepUpForSecondaryNumberChanges,
        ]
      properties:
        services:
          type: array
          items:
            type: object
            required:
              [
                id,
                label,
                enabled,
                requiredForAdmins,
                requiredForCustomers,
                lastUpdatedAt,
              ]
            properties:
              id:
                type: string
                enum: [totp, email_otp, sms_otp, webauthn, recovery_codes]
              label:
                type: string
              enabled:
                type: boolean
              requiredForAdmins:
                type: boolean
              requiredForCustomers:
                type: boolean
              lastUpdatedAt:
                type: string
                format: date-time
        trustedDeviceDays:
          type: integer
          minimum: 0
          maximum: 90
        stepUpForBundlePurchases:
          type: boolean
        stepUpForSecondaryNumberChanges:
          type: boolean
    TotpAuthenticatorApp:
      type: object
      required: [id, label, issuer, accountName, createdAt, status]
      properties:
        id:
          type: string
        label:
          type: string
          example: Microsoft Authenticator
        issuer:
          type: string
          example: MTN Bulk Data Wholesale
        accountName:
          type: string
          example: security.admin@mtn.co.ug
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, revoked]
    TotpEnrollmentRequest:
      type: object
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 80
          example: Microsoft Authenticator
    TotpEnrollment:
      type: object
      required:
        [
          id,
          label,
          secret,
          otpauthUrl,
          issuer,
          accountName,
          qrCodeDataUrl,
          recoveryCodes,
          expiresAt,
        ]
      properties:
        id:
          type: string
          description: Short-lived enrollment identifier required when verifying the six-digit code.
        label:
          type: string
          example: Microsoft Authenticator
        secret:
          type: string
          description: Base32 TOTP secret for manual entry. This value must only be returned during active enrollment.
          example: JBSWY3DPEHPK3PXPJBSWY3DPEHPK3PXP
        otpauthUrl:
          type: string
          format: uri
          description: Standard otpauth URI consumed by Google Authenticator, Microsoft Authenticator, and compatible apps.
        issuer:
          type: string
          example: MTN Bulk Data Wholesale
        accountName:
          type: string
          example: security.admin@mtn.co.ug
        qrCodeDataUrl:
          type: string
          description: Data URL containing a QR image generated from the otpauth URI.
        recoveryCodes:
          type: array
          description: Recovery codes to copy/download during enrollment. Treat as secrets.
          items:
            type: string
        expiresAt:
          type: string
          format: date-time
    TotpVerificationRequest:
      type: object
      required: [enrollmentId, code]
      properties:
        enrollmentId:
          type: string
        code:
          type: string
          pattern: "^\\d{6}$"
          example: "123456"
    TotpVerificationResult:
      type: object
      required: [enabled, recoveryCodes, verifiedAt]
      properties:
        enabled:
          type: boolean
        app:
          $ref: "#/components/schemas/TotpAuthenticatorApp"
        recoveryCodes:
          type: array
          items:
            type: string
        verifiedAt:
          type: string
          format: date-time
    AuthSession:
      type: object
      required:
        [
          id,
          device,
          browser,
          ipAddress,
          location,
          createdAt,
          lastActiveAt,
          current,
          status,
        ]
      properties:
        id:
          type: string
        device:
          type: string
          example: MacBook Pro
        browser:
          type: string
          example: Chrome 125
        ipAddress:
          type: string
          example: 196.43.183.20
        location:
          type: string
          example: Kampala, Uganda
        createdAt:
          type: string
          format: date-time
        lastActiveAt:
          type: string
          format: date-time
        current:
          type: boolean
        status:
          type: string
          enum: [active, revoked]
